services:
  server:
    build: .
    container_name: talentika_server
    command: ["uv", "run", "python", "manage.py", "runserver", "0.0.0.0:8000"]
    volumes:
      - .:/app
      - /app/.venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: talentika_dev
      DB_USER: talentika_user
      DB_PASSWORD: talentika_password
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ocr-worker:
    build: .
    container_name: talentika_ocr_worker
    command:
      [
        "uv",
        "run",
        "python",
        "manage.py",
        "run_analysis_workers",
        "--queue",
        "ocr",
      ]
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-analysis-worker:
    build: .
    container_name: talentika_ai_analysis_worker
    command:
      [
        "uv",
        "run",
        "python",
        "manage.py",
        "run_analysis_workers",
        "--queue",
        "ai_analysis",
      ]
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: talentika_postgres
    environment:
      POSTGRES_DB: talentika_dev
      POSTGRES_USER: talentika_user
      POSTGRES_PASSWORD: talentika_password
    volumes:
      - talentika_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talentika_user -d talentika_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: talentika_redis
    volumes:
      - talentika_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  talentika_postgres_data:
  talentika_redis_data:
