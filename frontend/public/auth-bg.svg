<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a3a6e"/>
      <stop offset="60%" stop-color="#0d2454"/>
      <stop offset="100%" stop-color="#061330"/>
    </radialGradient>
    <filter id="glowOrange" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowTeal" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowWhite" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bokeh">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bgGrad)"/>

  <!-- Bokeh blobs scattered across canvas -->
  <circle cx="180"  cy="150" r="45" fill="#4a90d9" opacity="0.10" filter="url(#bokeh)"/>
  <circle cx="520"  cy="80"  r="35" fill="#5bb8d4" opacity="0.10" filter="url(#bokeh)"/>
  <circle cx="900"  cy="130" r="50" fill="#4a90d9" opacity="0.09" filter="url(#bokeh)"/>
  <circle cx="1280" cy="200" r="40" fill="#3a6faf" opacity="0.11" filter="url(#bokeh)"/>
  <circle cx="300"  cy="500" r="42" fill="#4a90d9" opacity="0.10" filter="url(#bokeh)"/>
  <circle cx="700"  cy="450" r="38" fill="#6ac8e0" opacity="0.09" filter="url(#bokeh)"/>
  <circle cx="1100" cy="520" r="45" fill="#4a90d9" opacity="0.10" filter="url(#bokeh)"/>
  <circle cx="150"  cy="750" r="40" fill="#3a6faf" opacity="0.11" filter="url(#bokeh)"/>
  <circle cx="600"  cy="780" r="35" fill="#5bb8d4" opacity="0.09" filter="url(#bokeh)"/>
  <circle cx="1050" cy="800" r="50" fill="#4a90d9" opacity="0.10" filter="url(#bokeh)"/>
  <circle cx="1380" cy="700" r="38" fill="#3a6faf" opacity="0.11" filter="url(#bokeh)"/>

  <!--
    Node coordinates — spread across full 1440×900 canvas:
    Top area:    y 50–200
    Mid area:    y 300–600
    Bottom area: y 680–870
    Left edge, right edge, corners all covered
  -->

  <!-- Connection lines -->
  <g stroke="#c8d8f0" stroke-width="0.7" opacity="0.32" fill="none">
    <!-- Top-left cluster -->
    <line x1="80"   y1="110" x2="230"  y2="60"/>
    <line x1="80"   y1="110" x2="180"  y2="220"/>
    <line x1="230"  y1="60"  x2="380"  y2="130"/>
    <line x1="180"  y1="220" x2="380"  y2="130"/>
    <line x1="180"  y1="220" x2="100"  y2="340"/>
    <line x1="100"  y1="340" x2="260"  y2="390"/>
    <line x1="260"  y1="390" x2="180"  y2="220"/>

    <!-- Top-center cluster -->
    <line x1="530"  y1="50"  x2="680"  y2="110"/>
    <line x1="680"  y1="110" x2="610"  y2="230"/>
    <line x1="610"  y1="230" x2="530"  y2="50"/>
    <line x1="530"  y1="50"  x2="380"  y2="130"/>
    <line x1="680"  y1="110" x2="820"  y2="70"/>
    <line x1="820"  y1="70"  x2="960"  y2="160"/>
    <line x1="960"  y1="160" x2="820"  y2="70"/>

    <!-- Top-right cluster -->
    <line x1="1100" y1="50"  x2="1250" y2="110"/>
    <line x1="1250" y1="110" x2="1380" y2="60"/>
    <line x1="1380" y1="60"  x2="1440" y2="150"/>
    <line x1="1250" y1="110" x2="1160" y2="230"/>
    <line x1="1160" y1="230" x2="1100" y2="50"/>
    <line x1="960"  y1="160" x2="1100" y2="50"/>
    <line x1="960"  y1="160" x2="1160" y2="230"/>

    <!-- Left-mid cluster -->
    <line x1="40"   y1="470" x2="100"  y2="340"/>
    <line x1="40"   y1="470" x2="170"  y2="520"/>
    <line x1="170"  y1="520" x2="260"  y2="390"/>
    <line x1="170"  y1="520" x2="90"   y2="640"/>
    <line x1="90"   y1="640" x2="240"  y2="600"/>
    <line x1="240"  y1="600" x2="170"  y2="520"/>

    <!-- Center cluster -->
    <line x1="420"  y1="350" x2="610"  y2="230"/>
    <line x1="420"  y1="350" x2="260"  y2="390"/>
    <line x1="420"  y1="350" x2="550"  y2="460"/>
    <line x1="550"  y1="460" x2="420"  y2="350"/>
    <line x1="550"  y1="460" x2="700"  y2="380"/>
    <line x1="700"  y1="380" x2="610"  y2="230"/>
    <line x1="700"  y1="380" x2="840"  y2="300"/>
    <line x1="840"  y1="300" x2="700"  y2="380"/>
    <line x1="840"  y1="300" x2="960"  y2="160"/>
    <line x1="840"  y1="300" x2="980"  y2="390"/>
    <line x1="980"  y1="390" x2="1160" y2="230"/>
    <line x1="980"  y1="390" x2="1100" y2="480"/>
    <line x1="1100" y1="480" x2="1160" y2="230"/>
    <line x1="1100" y1="480" x2="1260" y2="420"/>
    <line x1="1260" y1="420" x2="1380" y2="340"/>
    <line x1="1380" y1="340" x2="1440" y2="440"/>
    <line x1="1380" y1="340" x2="1250" y2="110"/>

    <!-- Right-mid cluster -->
    <line x1="1260" y1="420" x2="1380" y2="540"/>
    <line x1="1380" y1="540" x2="1440" y2="440"/>
    <line x1="1380" y1="540" x2="1280" y2="630"/>
    <line x1="1280" y1="630" x2="1260" y2="420"/>

    <!-- Bottom-left cluster -->
    <line x1="60"   y1="760" x2="90"   y2="640"/>
    <line x1="60"   y1="760" x2="200"  y2="820"/>
    <line x1="200"  y1="820" x2="340"  y2="740"/>
    <line x1="340"  y1="740" x2="240"  y2="600"/>
    <line x1="340"  y1="740" x2="460"  y2="800"/>
    <line x1="460"  y1="800" x2="200"  y2="820"/>

    <!-- Bottom-center cluster -->
    <line x1="550"  y1="700" x2="460"  y2="800"/>
    <line x1="550"  y1="700" x2="700"  y2="650"/>
    <line x1="700"  y1="650" x2="550"  y2="460"/>
    <line x1="700"  y1="650" x2="840"  y2="750"/>
    <line x1="840"  y1="750" x2="550"  y2="700"/>
    <line x1="840"  y1="750" x2="980"  y2="680"/>
    <line x1="980"  y1="680" x2="1100" y2="480"/>
    <line x1="980"  y1="680" x2="840"  y2="300"/>

    <!-- Bottom-right cluster -->
    <line x1="1100" y1="800" x2="980"  y2="680"/>
    <line x1="1100" y1="800" x2="1280" y2="630"/>
    <line x1="1100" y1="800" x2="1280" y2="850"/>
    <line x1="1280" y1="850" x2="1380" y2="760"/>
    <line x1="1380" y1="760" x2="1440" y2="820"/>
    <line x1="1380" y1="760" x2="1280" y2="630"/>
    <line x1="1280" y1="850" x2="1100" y2="800"/>
  </g>

  <!-- Small dim nodes (connectors) -->
  <g fill="#a0bcd8" opacity="0.45">
    <circle cx="230"  cy="60"  r="2.5"/>
    <circle cx="380"  cy="130" r="2.5"/>
    <circle cx="530"  cy="50"  r="2.5"/>
    <circle cx="820"  cy="70"  r="2.5"/>
    <circle cx="1100" cy="50"  r="2.5"/>
    <circle cx="1380" cy="60"  r="2.5"/>
    <circle cx="40"   cy="470" r="2"/>
    <circle cx="420"  cy="350" r="2.5"/>
    <circle cx="700"  cy="380" r="2.5"/>
    <circle cx="1260" cy="420" r="2.5"/>
    <circle cx="1440" cy="150" r="2"/>
    <circle cx="1440" cy="440" r="2"/>
    <circle cx="460"  cy="800" r="2.5"/>
    <circle cx="200"  cy="820" r="2.5"/>
    <circle cx="1280" cy="850" r="2.5"/>
    <circle cx="1440" cy="820" r="2"/>
    <circle cx="550"  cy="700" r="2.5"/>
  </g>

  <!-- Teal glowing nodes -->
  <g filter="url(#glowTeal)">
    <circle cx="80"   cy="110" r="5"   fill="#7ee8f8" opacity="0.95"/>
    <circle cx="610"  cy="230" r="5"   fill="#7ee8f8" opacity="0.95"/>
    <circle cx="960"  cy="160" r="5"   fill="#7ee8f8" opacity="0.9"/>
    <circle cx="1160" cy="230" r="5"   fill="#7ee8f8" opacity="0.95"/>
    <circle cx="240"  cy="600" r="4.5" fill="#7ee8f8" opacity="0.9"/>
    <circle cx="700"  cy="650" r="5"   fill="#7ee8f8" opacity="0.95"/>
    <circle cx="1380" cy="540" r="5"   fill="#7ee8f8" opacity="0.9"/>
    <circle cx="100"  cy="340" r="4.5" fill="#7ee8f8" opacity="0.9"/>
    <circle cx="980"  cy="680" r="5"   fill="#7ee8f8" opacity="0.9"/>
  </g>

  <!-- Orange glowing nodes -->
  <g filter="url(#glowOrange)">
    <circle cx="180"  cy="220" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="680"  cy="110" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="1250" cy="110" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="170"  cy="520" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="550"  cy="460" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="980"  cy="390" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="1380" cy="340" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="60"   cy="760" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="340"  cy="740" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="840"  cy="750" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="1100" cy="800" r="5"   fill="#f5a623" opacity="0.95"/>
    <circle cx="1380" cy="760" r="5"   fill="#f5a623" opacity="0.9"/>
    <circle cx="90"   cy="640" r="4.5" fill="#f5a623" opacity="0.85"/>
    <circle cx="1280" cy="630" r="5"   fill="#f5a623" opacity="0.9"/>
  </g>

  <!-- Bright white hub nodes -->
  <g filter="url(#glowWhite)">
    <circle cx="260"  cy="390" r="6.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="840"  cy="300" r="7"   fill="#ffffff" opacity="0.95"/>
    <circle cx="1100" cy="480" r="6.5" fill="#ffffff" opacity="0.95"/>
    <circle cx="680"  cy="110" r="2"   fill="#ffffff" opacity="0.6"/>
    <circle cx="550"  cy="460" r="2"   fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Sparkle bottom-right -->
  <g transform="translate(1390, 840)" fill="white" opacity="0.8">
    <polygon points="0,-13 2.8,-2.8 13,0 2.8,2.8 0,13 -2.8,2.8 -13,0 -2.8,-2.8"/>
  </g>
</svg>
